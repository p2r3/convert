<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
  <title>Convert to it!</title>
  
  <meta name="url" content="https://convert.to.it">
  <meta name="identifier-URL" content="https://convert.to.it">
  <meta name="og:url" content="https://convert.to.it"/>
  <meta name="og:title" content="Convert to it!"/>
  <meta name="og:site_name" content="Convert to it!"/>
  <meta name="og:description" content="Truly universal online file converter. Private, on-device conversion across mediums."/>
  <meta name="og:image" content="https://p2r3.github.io/convert/assets/favicon-Bfod-rsk.ico"/>
  <meta name="theme-color" content="#1C77FF"/>
  <meta name="og:type" content="website"/>
  
  <!-- Initialize theme immediately to prevent flash -->
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = savedTheme || (prefersDark ? 'dark' : 'light');
      
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>

  <input id="file-input" type="file">

  <a id="commit-id" href="https://github.com/p2r3/convert"></a>

  <div id="file-area">
    <h2>Click to add your file</h2>
    <p id="drop-hint-text">or drag and drop it here</p>
  </div>
  <div id="side-panel">
    <button id="theme-toggle" class="theme-btn"></button>
    <button id="mode-button">Advanced mode</button>
  </div>

  <div id="format-containers">

    <div id="from-container" class="format-container">
      <h2>Convert from:</h2>
      <input type="text" id="search-from" class="search" placeholder="Search">
      <div id="from-list" class="format-list">

      </div>
    </div>

    <div id="to-container" class="format-container">
      <h2>Convert to:</h2>
      <input type="text" id="search-to" class="search" placeholder="Search">
      <div id="to-list" class="format-list">

      </div>
    </div>

  </div>

  <button id="convert-button" class="disabled">Convert</button>

  <div id="popup-bg"></div>
  <div id="popup">
    <h2>Loading tools...</h2>
  </div>

  <script>
    // Initialize theme from localStorage or system preference
    function initializeTheme() {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = savedTheme || (prefersDark ? 'dark' : 'light');
      
      applyTheme(theme);
    }
    
    // Apply theme to document
    function applyTheme(theme) {
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
        const btn = document.getElementById('theme-toggle');
        if (btn) btn.textContent = 'Light mode';
      } else {
        document.documentElement.removeAttribute('data-theme');
        const btn = document.getElementById('theme-toggle');
        if (btn) btn.textContent = 'Dark mode';
      }
      localStorage.setItem('theme', theme);
    }
    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', function() {
      initializeTheme();
      
      // Toggle theme on button click
      const themeBtn = document.getElementById('theme-toggle');
      if (themeBtn) {
        themeBtn.addEventListener('click', function() {
          const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
          const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
          applyTheme(newTheme);
        });
      }
    });
  </script>

  <script type="module" src="src/main.ts"></script>

</body>
</html>
